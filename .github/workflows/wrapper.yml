name: Build Windows Wrapper DLL

on:
  push:
  workflow_dispatch:

jobs:
  build-wrapper:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Compile wrapper.dll
        shell: msys2 {0}
        run: |
          mkdir -p build

          gcc \
            -shared \
            -O2 \
            -o build/wrapper.dll \
            src/wrapper.c \
            -lkernel32

      - name: Upload wrapper.dll
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-windows-x64
          path: build/wrapper.dll
